<section class="space-y-4 rounded-2xl border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
  <div class="flex items-center justify-between">
    <h3 class="text-sm font-semibold uppercase tracking-[0.15em] text-slate-500 dark:text-slate-400">Analytics</h3>
    <p class="text-sm font-bold">{{ totalViews() }} toplam okunma</p>
  </div>

  <div class="space-y-2">
    @for (item of topNews(); track item.title) {
      <div class="rounded-lg border border-slate-200 px-3 py-2 dark:border-slate-700">
        <p class="line-clamp-1 text-sm font-semibold">{{ item.title }}</p>
        <p class="text-xs text-slate-500 dark:text-slate-400">{{ item.viewCount }} okuma • {{ item.categoryName }}</p>
      </div>
    } @empty {
      <p class="text-sm text-slate-500 dark:text-slate-400">Veri bulunamadi.</p>
    }
  </div>
</section>
