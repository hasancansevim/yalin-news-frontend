<a
  class="group flex flex-col h-full overflow-hidden bg-white/50 transition-all duration-500 hover:bg-white dark:bg-slate-900/40 dark:hover:bg-slate-900 rounded-[2rem] border border-slate-200/60 dark:border-white/5 hover:shadow-2xl hover:shadow-indigo-500/10 dark:hover:shadow-indigo-500/5 hover:-translate-y-1"
  [routerLink]="['/news', toSlug(news.title)]"
>
  <div class="relative h-60 overflow-hidden rounded-[2rem] m-2">
    <img
      class="h-full w-full object-cover opacity-90 transition duration-700 group-hover:scale-[1.05] group-hover:opacity-100"
      [src]="news.imageUrl"
      [alt]="news.title"
      loading="lazy"
      decoding="async"
      (error)="onImageError($event)"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-60"></div>
    <span
      class="absolute left-4 top-4 rounded-full bg-white/90 px-4 py-1.5 font-sans text-[10px] font-bold uppercase tracking-widest text-slate-900 shadow-sm backdrop-blur"
    >
      {{ news.categoryName }}
    </span>
  </div>

  <div class="flex flex-1 flex-col justify-between p-6">
    <div class="space-y-4">
      <h3 class="line-clamp-3 font-serif text-[1.35rem] font-bold leading-snug tracking-tight text-slate-900 transition-colors group-hover:text-indigo-600 dark:text-slate-100 dark:group-hover:text-indigo-400">
        {{ news.title }}
      </h3>

      <p class="line-clamp-2 font-sans text-sm leading-relaxed text-slate-500 dark:text-slate-400">
        {{ news.spotText }}
      </p>
    </div>

    <div class="mt-6 flex items-center gap-3 font-sans text-xs font-medium text-slate-400 dark:text-slate-500">
      <span class="flex items-center gap-1.5 text-slate-600 dark:text-slate-300">
        {{ news.authorName }}
      </span>
      <span class="h-1 w-1 rounded-full bg-slate-300 dark:bg-slate-700"></span>
      <time>{{ news.publishDate | date: 'dd MMM yyyy' }}</time>
    </div>
  </div>
</a>
