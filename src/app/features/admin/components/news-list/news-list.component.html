<div class="overflow-hidden rounded-2xl border border-slate-200 dark:border-slate-800">
  <div class="grid grid-cols-[2fr_1fr_120px_180px] gap-2 bg-slate-100 px-4 py-3 text-xs font-semibold uppercase tracking-[0.15em] text-slate-500 dark:bg-slate-900 dark:text-slate-400">
    <span>Baslik</span>
    <span>Kategori</span>
    <span>Durum</span>
    <span class="text-right">Aksiyon</span>
  </div>

  @for (item of newsList; track item.title + item.publishDate) {
    <div
      class="grid grid-cols-[2fr_1fr_120px_180px] items-center gap-2 border-t border-slate-200 px-4 py-3 text-sm dark:border-slate-800"
      [class.bg-indigo-50]="selectedTitle === item.title"
      [class.dark:bg-slate-900/70]="selectedTitle === item.title"
    >
      <div>
        <p class="line-clamp-1 font-semibold">{{ item.title }}</p>
        <p class="text-xs text-slate-500 dark:text-slate-400">{{ item.authorName }}</p>
      </div>
      <span>{{ item.categoryName }}</span>
      <span
        class="w-fit rounded-full px-2 py-1 text-xs font-semibold"
        [class.bg-emerald-100]="item.status === 'Published'"
        [class.text-emerald-700]="item.status === 'Published'"
        [class.bg-amber-100]="item.status !== 'Published'"
        [class.text-amber-700]="item.status !== 'Published'"
      >
        {{ item.status }}
      </span>
      <div class="flex justify-end gap-2">
        <button
          type="button"
          class="rounded-lg border border-slate-300 px-2 py-1 text-xs font-medium transition hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800"
          (click)="toggleBreaking.emit(item)"
        >
          Son Dakika
        </button>
        <button
          type="button"
          class="rounded-lg border border-indigo-300 px-2 py-1 text-xs font-medium text-indigo-700 transition hover:bg-indigo-50 dark:border-indigo-600 dark:text-indigo-300 dark:hover:bg-indigo-500/10"
          (click)="editNews.emit(item)"
        >
          Duzenle
        </button>
        <button
          type="button"
          class="rounded-lg border border-rose-300 px-2 py-1 text-xs font-medium text-rose-700 transition hover:bg-rose-50 dark:border-rose-600 dark:text-rose-300 dark:hover:bg-rose-500/10"
          (click)="deleteNews.emit(item)"
        >
          Sil
        </button>
      </div>
    </div>
  } @empty {
    <div class="px-4 py-8 text-center text-sm text-slate-500 dark:text-slate-400">
      Gosterilecek haber bulunamadi.
    </div>
  }
</div>
