<section class="mx-auto mt-16 w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
  <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Kayıt Ol</h1>
  <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">YalınNews dünyasına katılmak için bilgilerinizi girin.</p>

  <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    <div class="flex gap-4">
      <label class="block space-y-1 text-sm w-full">
        <span class="font-medium text-slate-700 dark:text-slate-200">Ad</span>
        <input
          type="text"
          formControlName="firstName"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950"
          placeholder="Ahmet"
        />
      </label>
      <label class="block space-y-1 text-sm w-full">
        <span class="font-medium text-slate-700 dark:text-slate-200">Soyad</span>
        <input
          type="text"
          formControlName="lastName"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950"
          placeholder="Yılmaz"
        />
      </label>
    </div>

    <label class="block space-y-1 text-sm">
      <span class="font-medium text-slate-700 dark:text-slate-200">E-posta</span>
      <input
        type="email"
        formControlName="email"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950"
        placeholder="ornek@example.com"
      />
    </label>

    <label class="block space-y-1 text-sm">
      <span class="font-medium text-slate-700 dark:text-slate-200">Sifre</span>
      <input
        type="password"
        formControlName="password"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950"
        placeholder="******"
      />
    </label>

    @if (errorMessage()) {
      <p class="text-sm text-rose-600 dark:text-rose-400">{{ errorMessage() }}</p>
    }

    <button
      type="submit"
      class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="isSubmitting()"
    >
      {{ isSubmitting() ? 'Kayıt olunuyor...' : 'Hesap Oluştur' }}
    </button>

    <div class="mt-4 text-center text-sm text-slate-600 dark:text-slate-400">
      Zaten hesabınız var mı? 
      <a routerLink="/login" class="font-semibold text-indigo-600 hover:underline dark:text-indigo-400">
        Giriş Yap
      </a>
    </div>
  </form>
</section>
