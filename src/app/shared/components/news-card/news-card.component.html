<a
  class="group block overflow-hidden rounded-2xl border border-slate-200/80 bg-white/90 transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl hover:shadow-indigo-500/15 dark:border-slate-800 dark:bg-black"
  [routerLink]="['/news', toSlug(news.title)]"
>
  <div class="relative h-52 overflow-hidden">
    <img
      class="h-full w-full object-cover transition duration-500 group-hover:scale-105"
      [src]="news.imageUrl"
      [alt]="news.title"
      loading="lazy"
      decoding="async"
      (error)="onImageError($event)"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
    <span
      class="absolute left-4 top-4 rounded-full border bg-gradient-to-r px-3 py-1 text-xs font-semibold tracking-wide backdrop-blur"
      [class]="categoryTone(news.categoryName)"
    >
      {{ news.categoryName }}
    </span>
  </div>

  <div class="space-y-3 p-5">
    <h3 class="line-clamp-2 text-xl font-bold tracking-tight text-slate-900 dark:text-white">
      {{ news.title }}
    </h3>

    <p class="line-clamp-2 text-sm leading-relaxed text-slate-600 dark:text-slate-300">
      {{ news.spotText }}
    </p>

    <div
      class="flex items-center justify-between border-t border-slate-200/80 pt-3 text-xs text-slate-500 dark:border-white/10 dark:text-slate-400"
    >
      <span>{{ news.publishDate | date: 'dd MMM yyyy' }}</span>
      <span>{{ news.viewCount }} okuma</span>
    </div>
  </div>
</a>
