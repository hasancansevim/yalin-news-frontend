<section class="space-y-6 rounded-3xl border border-slate-200 bg-white/80 p-4 text-slate-900 dark:border-white/10 dark:bg-slate-950 dark:text-slate-100 md:p-6">
  <div class="space-y-2">
    <h1 class="text-3xl font-extrabold tracking-tight">Admin Panel</h1>
    <p class="text-sm text-slate-600 dark:text-slate-300">Icerik yonetimi ve metrikler.</p>
  </div>

  <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
    @for (card of statCards(); track card.label) {
      <article
        class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition hover:-translate-y-0.5 hover:shadow-lg dark:border-slate-800 dark:bg-slate-900"
      >
        <p class="text-xs uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">{{ card.label }}</p>
        <p class="mt-2 text-2xl font-bold">{{ card.value }}</p>
      </article>
    }
  </div>

  <div class="grid gap-6 xl:grid-cols-[1.4fr_1fr]">
    <div class="space-y-4">
      <app-admin-news-list
        [newsList]="list()"
        [selectedTitle]="activeEdit()?.title ?? null"
        (editNews)="startEdit($event)"
        (deleteNews)="removeNews($event)"
        (toggleBreaking)="toggleBreaking($event)"
      ></app-admin-news-list>

      <app-admin-news-form
        [editItem]="activeEdit()"
        (save)="saveNews($event)"
        (cancel)="clearEdit()"
      ></app-admin-news-form>
    </div>

    <app-admin-analytics [newsList]="list()"></app-admin-analytics>
  </div>
</section>
