<div class="space-y-3">
  @for (item of newsList; track trackNews(item)) {
    <div
      class="group flex flex-col md:flex-row items-center justify-between gap-6 border-b border-border py-4 transition-colors hover:bg-surface/50 px-4 -mx-4"
      [class.bg-surface]="selectedTitle === item.title"
    >
      <div class="flex items-center gap-4 flex-1 min-w-0">
        <!-- Thumbnail -->
        <div class="h-16 w-24 shrink-0 bg-surface overflow-hidden border border-border">
          <img [src]="item.imageUrl" alt="" class="h-full w-full object-cover grayscale-[50%] transition-all group-hover:grayscale-0" />
        </div>
        
        <!-- Title & Spot -->
        <div class="flex-1 min-w-0">
          <h3 class="truncate font-display text-[16px] font-bold text-text-primary transition-colors group-hover:text-accent-main">
            {{ item.title }}
          </h3>
          <p class="truncate font-body text-[13px] text-text-secondary mt-1">
            {{ item.spotText }}
          </p>
        </div>
      </div>

      <!-- Middle: Category & Author -->
      <div class="flex items-center gap-6 w-48 shrink-0 font-ui text-[11px] uppercase tracking-wider text-text-secondary">
        <span class="w-20 truncate text-accent-main">{{ item.categoryName }}</span>
        <span class="w-20 truncate">{{ item.authorName }}</span>
      </div>

      <!-- Right: Status, ViewCount, Actions -->
      <div class="flex items-center gap-6 shrink-0">
        <div class="flex flex-col items-end gap-1 font-ui text-[10px] uppercase tracking-widest">
          <span
            class="px-2 py-0.5 border"
            [class.border-[#4CAF82]]="isPublishedStatus(item)"
            [class.text-[#4CAF82]]="isPublishedStatus(item)"
            [class.border-[#C8A96E]]="!isPublishedStatus(item)"
            [class.text-[#C8A96E]]="!isPublishedStatus(item)"
          >
            {{ item.status }}
          </span>
          <span class="text-text-secondary">{{ item.viewCount }} okuma</span>
        </div>

        <div class="flex items-center gap-2">
          <button
            type="button"
            class="h-8 px-4 font-ui text-[11px] uppercase tracking-widest transition-all border border-accent-main text-accent-main hover:bg-accent-main hover:text-bg-main"
            (click)="editNews.emit(item)"
          >
            Düzenle
          </button>
          
          <button
            type="button"
            class="h-8 w-8 flex items-center justify-center border border-border text-text-secondary transition-all hover:border-[#E05C5C] hover:text-[#E05C5C]"
            (click)="deleteNews.emit(item)"
            title="Sil"
          >
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          </button>
        </div>
      </div>
    </div>
  } @empty {
    <div class="flex flex-col items-center justify-center border border-border p-16 text-center">
      <h3 class="font-display text-lg font-bold text-text-primary">Kayıt Bulunamadı</h3>
      <p class="mt-2 font-body text-sm text-text-secondary">Henüz hiç haber eklenmemiş.</p>
    </div>
  }
</div>
