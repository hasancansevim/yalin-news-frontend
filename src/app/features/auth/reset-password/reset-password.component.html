<section class="mx-auto mt-16 w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
  <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Yeni Şifre Belirleme</h1>
  <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">Lütfen yeni şifrenizi girin.</p>

  @if (message()) {
    <div class="mt-4 p-3 rounded-lg text-sm" 
         [ngClass]="isError() ? 'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400' : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400'">
      {{ message() }}
    </div>
  }

  <form class="mt-6 space-y-4" (ngSubmit)="onSubmit()" #resetForm="ngForm">
    <label class="block space-y-1 text-sm">
      <span class="font-medium text-slate-700 dark:text-slate-200">Yeni Şifre</span>
      <input
        type="password"
        name="newPassword"
        [(ngModel)]="newPassword"
        required
        minlength="6"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950"
        placeholder="******"
        [disabled]="isLoading() || !token()"
      />
    </label>

    <label class="block space-y-1 text-sm">
      <span class="font-medium text-slate-700 dark:text-slate-200">Yeni Şifre (Tekrar)</span>
      <input
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        required
        minlength="6"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950"
        placeholder="******"
        [disabled]="isLoading() || !token()"
      />
    </label>

    <button
      type="submit"
      class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-60"
      [disabled]="!resetForm.form.valid || isLoading() || !token()"
    >
      {{ isLoading() ? 'Kaydediliyor...' : 'Şifreyi Güncelle' }}
    </button>
  </form>
</section>
