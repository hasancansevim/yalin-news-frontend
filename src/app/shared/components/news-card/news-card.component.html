<a
  class="group flex flex-col h-full overflow-hidden transition-all duration-300 hover:-translate-y-1"
  [routerLink]="['/news', toSlug(news.title)]"
>
  <div class="relative w-full aspect-video overflow-hidden mb-5">
    <img
      class="h-full w-full object-cover transition duration-700 group-hover:scale-[1.02]"
      [src]="news.imageUrl"
      [alt]="news.title"
      loading="lazy"
      decoding="async"
      (error)="onImageError($event)"
    />
  </div>

  <div class="flex flex-col flex-1 pb-6 border-b border-border transition-colors group-hover:border-accent-main/30">
    <div class="mb-3 font-ui text-[11px] uppercase tracking-widest text-accent-main">
      {{ news.categoryName }}
    </div>

    <h3 class="mb-3 font-display text-[18px] font-bold leading-snug tracking-tight text-text-primary transition-colors group-hover:text-accent-main line-clamp-3">
      {{ news.title }}
    </h3>

    <p class="mb-5 font-body text-[15px] leading-relaxed text-text-secondary line-clamp-2">
      {{ news.spotText }}
    </p>

    <div class="mt-auto flex items-center gap-3 font-ui text-[11px] uppercase tracking-wider text-text-secondary">
      <span class="text-text-primary">{{ news.authorName }}</span>
      <span>{{ news.publishDate | date: 'dd MMM yyyy' }}</span>
      <span class="ml-auto flex items-center gap-1 text-accent-main/80">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ Math.max(1, Math.ceil((news.content.split(' ').length || 200) / 200)) }} dk
      </span>
    </div>
  </div>
</a>
