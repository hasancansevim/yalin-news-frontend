<section class="space-y-6 rounded-3xl border border-slate-200 bg-white/80 p-4 text-slate-900 dark:border-white/10 dark:bg-slate-950 dark:text-slate-100 md:p-6">
  <div class="space-y-2">
    <h1 class="text-3xl font-extrabold tracking-tight">Admin Panel</h1>
    <p class="text-sm text-slate-600 dark:text-slate-300">Icerik yonetimi ve metrikler.</p>
  </div>

  @if (listError()) {
    <p
      class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800 dark:border-rose-900/60 dark:bg-rose-950/40 dark:text-rose-200"
      role="alert"
    >
      {{ listError() }}
    </p>
  }

  <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
    @for (card of statCards(); track card.label) {
      <article
        class="rounded-2xl border border-slate-200/60 bg-white/80 p-5 shadow-sm backdrop-blur-md transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-indigo-500/10 dark:border-slate-800/80 dark:bg-slate-900/80"
      >
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">{{ card.label }}</p>
        <p class="mt-3 text-3xl font-extrabold text-indigo-950 dark:text-indigo-100">{{ card.value }}</p>
      </article>
    }
  </div>

  <div class="grid gap-6 xl:grid-cols-[1.4fr_1fr]">
    <div class="space-y-4">
      <app-admin-news-list
        [newsList]="list()"
        [selectedTitle]="activeEdit()?.title ?? null"
        [breakingTitles]="breakingTitles()"
        (editNews)="startEdit($event)"
        (deleteNews)="removeNews($event)"
        (toggleBreaking)="toggleBreaking($event)"
      ></app-admin-news-list>

      <app-admin-news-form
        [editItem]="activeEdit()"
        (saved)="afterSave()"
        (cancel)="clearEdit()"
      ></app-admin-news-form>
    </div>

    <app-admin-analytics [newsList]="list()"></app-admin-analytics>
  </div>
</section>
