<header class="sticky inset-x-0 top-0 z-50 transition-all duration-300 backdrop-blur-md bg-bg-main/90 border-b border-accent-main/30 shadow-[0_1px_0_0_rgba(200,169,110,0.1)]">
  <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-accent-main/50 to-transparent"></div>
  <nav
    class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 py-4 md:px-6"
    aria-label="Main navigation"
  >
    <div class="flex items-center gap-6">
      <a routerLink="/" class="group inline-flex items-center">
        <span
          class="font-display text-2xl font-black tracking-[-0.02em] text-accent-main transition-opacity group-hover:opacity-80"
        >
          YALIN
        </span>
      </a>
    </div>

    <div class="flex items-center gap-4">
      <!-- Auth Buttons -->
      @if (authService.isLoggedIn()) {
        <!-- Can be customized later to check if user is admin specifically -->
        <a routerLink="/admin" class="hidden md:inline-flex px-3 py-1.5 rounded-lg border border-accent-main text-accent-main font-ui text-sm font-medium hover:bg-accent-main hover:text-white transition-colors">Admin Panel</a>
        <button (click)="logout()" class="px-3 py-1.5 rounded-lg border border-border bg-surface text-text-primary font-ui text-sm font-medium hover:bg-rose-500 hover:text-white hover:border-rose-500 transition-colors">Çıkış Yap</button>
      } @else {
        <a routerLink="/login" class="px-3 py-1.5 rounded-lg border border-border bg-surface text-text-primary font-ui text-sm font-medium hover:bg-bg-main transition-colors">Giriş Yap</a>
        <a routerLink="/register" class="px-3 py-1.5 rounded-lg bg-accent-main text-white font-ui text-sm font-medium hover:bg-accent-secondary transition-colors shadow-sm shadow-accent-main/20">Kayıt Ol</a>
      }

      <button
        type="button"
        (click)="toggleTheme()"
        class="inline-flex h-9 w-9 items-center justify-center rounded-full text-text-secondary transition-colors hover:text-accent-main ml-2"
        [attr.aria-label]="isDark() ? 'Aydınlık temaya geç' : 'Karanlık temaya geç'"
      >
        @if (isDark()) {
          <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 4V2m0 20v-2m8-8h2M2 12h2m13.66 5.66 1.41 1.41M4.93 4.93l1.41 1.41m11.32 0 1.41-1.41M4.93 19.07l1.41-1.41M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        } @else {
          <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M21 14.7A8.5 8.5 0 1 1 9.3 3a7.1 7.1 0 0 0 11.7 11.7Z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        }
      </button>
    </div>
  </nav>
</header>
