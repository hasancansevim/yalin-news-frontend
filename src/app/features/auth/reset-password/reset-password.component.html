<section class="min-h-screen flex items-center justify-center bg-bg-main text-text-primary px-4 py-12">
  <div class="w-full max-w-md bg-surface border border-border p-8 shadow-sm">
    <div class="text-center mb-8">
      <h1 class="font-display text-2xl font-bold text-accent-main mb-2">Yeni Şifre Belirleme</h1>
      <p class="font-body text-sm text-text-secondary">Lütfen yeni şifrenizi girin.</p>
    </div>

    @if (message()) {
      <div class="mb-6 p-4 border text-sm font-ui" 
           [ngClass]="isError() ? 'border-red-500/30 bg-red-500/10 text-red-400' : 'border-emerald-500/30 bg-emerald-500/10 text-emerald-400'">
        {{ message() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #resetForm="ngForm" class="space-y-6">
      <div>
        <label for="newPassword" class="block font-ui text-[11px] uppercase tracking-widest text-text-secondary mb-2">
          Yeni Şifre
        </label>
        <input
          type="password"
          id="newPassword"
          name="newPassword"
          [(ngModel)]="newPassword"
          required
          minlength="6"
          placeholder="Yeni şifreniz"
          class="w-full bg-bg-main border border-border px-4 py-3 font-body text-sm text-text-primary placeholder:text-text-secondary/50 focus:outline-none focus:border-accent-secondary transition-colors"
          [disabled]="isLoading() || !token()"
        />
      </div>

      <div>
        <label for="confirmPassword" class="block font-ui text-[11px] uppercase tracking-widest text-text-secondary mb-2">
          Yeni Şifre (Tekrar)
        </label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          minlength="6"
          placeholder="Yeni şifreniz tekrar"
          class="w-full bg-bg-main border border-border px-4 py-3 font-body text-sm text-text-primary placeholder:text-text-secondary/50 focus:outline-none focus:border-accent-secondary transition-colors"
          [disabled]="isLoading() || !token()"
        />
      </div>

      <button
        type="submit"
        [disabled]="!resetForm.form.valid || isLoading() || !token()"
        class="w-full bg-accent-main text-bg-main font-ui text-[11px] uppercase tracking-widest font-bold py-4 px-6 hover:bg-accent-secondary transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isLoading() ? 'Kaydediliyor...' : 'Şifreyi Güncelle' }}
      </button>
    </form>
  </div>
</section>
