<form class="space-y-4 rounded-2xl border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900" [formGroup]="form" (ngSubmit)="submit()">
  @if (submitErrorLines().length) {
    <div
      class="rounded-lg border border-rose-300 bg-rose-50 px-3 py-3 text-rose-800 dark:border-rose-500/40 dark:bg-rose-500/10 dark:text-rose-100"
      role="alert"
    >
      <p class="text-sm font-semibold">Islem tamamlanamadi</p>
      <ul class="mt-2 list-disc space-y-1.5 pl-5 text-sm">
        @for (line of submitErrorLines(); track $index) {
          <li>{{ line }}</li>
        }
      </ul>
    </div>
  }

  <div class="grid gap-4 md:grid-cols-2">
    <label class="space-y-1 text-sm">
      <span class="font-medium">Baslik</span>
      <input class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" formControlName="title" />
    </label>
    <label class="space-y-1 text-sm">
      <span class="font-medium">Kategori</span>
      <select class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" formControlName="categoryId">
        @if (isLookupsLoading()) {
          <option [ngValue]="0">Kategoriler yukleniyor...</option>
        } @else {
          <option [ngValue]="0">Kategori secin</option>
          @for (c of categoryOptions(); track c.id) {
            <option [ngValue]="c.id">{{ c.name }}</option>
          }
        }
      </select>
    </label>
    <label class="space-y-1 text-sm">
      <span class="font-medium">Yazar</span>
      <select class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" formControlName="authorId">
        @if (isLookupsLoading()) {
          <option [ngValue]="0">Yazarlar yukleniyor...</option>
        } @else {
          <option [ngValue]="0">Yazar secin</option>
          @for (a of authorOptions(); track a.id) {
            <option [ngValue]="a.id">{{ a.name }}</option>
          }
        }
      </select>
    </label>
    <label class="space-y-1 text-sm">
      <span class="font-medium">Durum</span>
      <select class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" formControlName="status">
        <option value="Draft">Draft</option>
        <option value="Published">Published</option>
      </select>
    </label>
  </div>

  <label class="space-y-1 text-sm">
    <span class="font-medium">Gorsel URL</span>
    <input class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" formControlName="imageUrl" />
  </label>

  <label class="space-y-1 text-sm">
    <span class="font-medium">Spot Metin</span>
    <textarea class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" rows="2" formControlName="spotText"></textarea>
  </label>

  <label class="space-y-1 text-sm">
    <span class="font-medium">Icerik</span>
    <textarea class="w-full rounded-lg border border-slate-300 px-3 py-2 dark:border-slate-700 dark:bg-slate-950" rows="6" formControlName="content"></textarea>
  </label>

  <div class="flex justify-end gap-2">
    <button
      type="button"
      class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium transition hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800"
      (click)="cancel.emit()"
    >
      Vazgec
    </button>
    <button
      type="submit"
      [disabled]="
        isSaving() || isLookupsLoading() || !categoryOptions().length || !authorOptions().length
      "
      [class.cursor-not-allowed]="
        isSaving() || isLookupsLoading() || !categoryOptions().length || !authorOptions().length
      "
      [class.opacity-70]="
        isSaving() || isLookupsLoading() || !categoryOptions().length || !authorOptions().length
      "
      class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-indigo-500"
    >
      {{ isSaving() ? 'Kaydediliyor...' : 'Kaydet' }}
    </button>
  </div>
</form>
